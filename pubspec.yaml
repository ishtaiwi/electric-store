name: electrical_store
description: Electrical Tools and Supplies Store Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  data_table_2: ^2.5.8
  fl_chart: ^0.65.0
  intl: 0.20.2
  
  # Printing & PDF
  pdf: ^3.10.6
  printing: ^5.11.1
  
  # File Operations
  file_picker: ^6.1.1
  archive: ^3.4.9
  
  # Utils
  get_it: ^7.6.4
  uuid: ^4.2.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
